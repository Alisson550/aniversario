<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário!</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9770);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    padding:35px;
    border-radius:20px;
    text-align:center;
    width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    margin:20px 0;
    border:5px solid #ff4f81;
}

h1{
    color:#ff4f81;
}

p{
    color:#555;
    line-height:1.5;
}

button{
    background:#ff4f81;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#ff2968;
}
</style>

</head>
<body>

<div class="card">

<h1>🎉 Feliz Aniversário, Maria! 🎉</h1>

<img src="foto.jpg" alt="Foto">

<p>
Que seu dia seja repleto de alegria, saúde e momentos inesquecíveis.
Preparei uma mensagem especial para você. ❤️
</p>

<button onclick="document.getElementById('audio').play()">
▶ Ouvir Mensagem
</button>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

</div>

</body>
</html>
