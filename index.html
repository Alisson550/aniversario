<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário!</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9770);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4f81;
}

button{
    background:#ff4f81;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
}
</style>

</head>
<body>

<div class="card">

<h1>🎉 Feliz Aniversário! 🎉</h1>

<p>Espero que seu dia seja incrível!</p>

<button id="playBtn">▶ Ouvir Mensagem</button>

<audio id="audio" src="audio.mp3"></audio>

</div>

<script>
const audio = document.getElementById("audio");
const botao = document.getElementById("playBtn");

botao.addEventListener("click", async () => {
    try {
        await audio.play();
    } catch (e) {
        console.error(e);
        alert("Não foi possível reproduzir o áudio.");
    }
});
</script>

</body>
</html>
